name: Aces compare

on:
  workflow_dispatch:
    inputs:
      match:
        description: "Filtre match optionnel (ex. sinner)"
        required: false
        default: ""
      mode:
        description: "live = scrape FR+FD | scan-json = cache FR + FanDuel frais (recommande cloud)"
        required: false
        default: "scan-json"
        type: choice
        options:
          - scan-json
          - live

permissions:
  contents: write

jobs:
  compare:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Probe books FR (diagnostic)
        continue-on-error: true
        run: |
          python - <<'PY'
          import requests
          urls = {
              "unibet": "https://www.unibet.fr/paris-tennis",
              "betclic": "https://www.betclic.fr/tennis-stennis",
              "winamax": "https://www.winamax.fr/paris-sportifs/sports/5",
          }
          for name, url in urls.items():
              try:
                  r = requests.get(url, timeout=20, headers={"User-Agent": "Mozilla/5.0"})
                  print(f"{name}: HTTP {r.status_code}")
              except Exception as exc:
                  print(f"{name}: ERROR {exc}")
          PY

      - name: Mark run as started
        run: |
          python scripts/write_run_status.py \
            --status running \
            --message "Comparaison en cours (mode ${{ github.event.inputs.mode }})..." \
            --match "${{ github.event.inputs.match }}"

      - name: Run aces compare
        id: compare
        run: |
          set -o pipefail
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then MODE="scan-json"; fi
          CMD=(python compare_tennis_aces_vs_fanduel.py -o web/public/latest_aces.csv)
          if [ "$MODE" = "scan-json" ]; then
            if [ ! -f web/public/aces_scan_cache.json ]; then
              echo "Missing web/public/aces_scan_cache.json"
              exit 1
            fi
            CMD+=(--scan-json web/public/aces_scan_cache.json)
          fi
          if [ -n "${{ github.event.inputs.match }}" ]; then
            CMD+=(--match "${{ github.event.inputs.match }}")
          fi
          echo "Running: ${CMD[*]}"
          "${CMD[@]}" 2>&1 | tee compare.log

      - name: Upload compare log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compare-log
          path: compare.log

      - name: Mark run as success
        if: success()
        run: |
          python scripts/write_run_status.py \
            --status success \
            --message "Comparaison terminee (mode ${{ github.event.inputs.mode }})." \
            --match "${{ github.event.inputs.match }}" \
            --from-json web/public/latest_aces.json

      - name: Mark run as failed
        if: failure()
        run: |
          python scripts/write_run_status.py \
            --status error \
            --message "Echec. En mode live, les books FR bloquent souvent l'IP GitHub. Essaie mode scan-json." \
            --match "${{ github.event.inputs.match }}"

      - name: Commit results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(aces): update compare results [skip ci]"
          git push
